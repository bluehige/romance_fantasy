개요:
  시스템명: "직명 계약술"
  정의: "공적 직위와 계약 원문을 매개로 권한을 행사하는 제국의 핵심 마법 시스템"
  작동전제:
    - "직명록에 등재된 직위일 것"
    - "적법한 임명 절차를 거칠 것"
    - "해당 직위에 대응하는 인장과 증표가 있을 것"

핵심용어:
  직명록: "모든 공적 직위와 계약 원문이 기록된 장부"
  원문계약: "왕조 창건기 또는 후대 개정으로 작성된 권한 문장"
  인장: "현재 권한자가 합법적으로 행사 중임을 인증하는 표식"
  해석자: "원문계약을 읽고 의미를 확정하는 전문가"
  증인: "고위 계약 발동과 해제 시 입회해야 하는 적법한 확인자"

권한부여:
  발동조건:
    - "직위 보유자일 것"
    - "직무 범위 안에서 행사할 것"
    - "직명록과 현장 권한이 충돌하지 않을 것"
  대표권한:
    - "발령"
    - "파면"
    - "열람"
    - "명령 승인"
    - "결계 접근"
    - "예산 승인"

해고와해제:
  일반직위:
    필요요소:
      - "파면 사유"
      - "상급 승인"
      - "파면 인장"
    결과:
      - "직위 박탈"
      - "권한 소거"
      - "사회적 지위 하락"
  고대계약직:
    필요요소:
      - "원문계약 정확 해석"
      - "군주의 적법한 인장"
      - "계약상 요구 증인"
      - "반동 방지용 완충 결계"
    위험:
      - "계약 반동"
      - "결계 붕괴"
      - "당사자 신체 및 시간 손상"
      - "직위 연동 예산과 명령 체계 교란"

대가:
  일반대가:
    - "고위 계약 열람 시 정신 피로"
    - "반복 해석 시 기억 파손"
  중대대가:
    - "원문계약 오독 시 반동 화상"
    - "권한 남용 시 직위 오염"
    - "핵심 결계 계약 해제 실패 시 도시 단위 피해"

제약:
  - "직위가 허용하지 않는 권한은 행사할 수 없다"
  - "개인 능력이 높아도 원문계약을 우회할 수 없다"
  - "왕조 초대 계약은 단일 행정명령으로 해제할 수 없다"
  - "고대 계약은 당사자의 동의 또는 대체 문장의 성립이 필요할 수 있다"

특수사례:
  불멸계약:
    정의: "왕조 초기에 제국 존속을 위해 맺어진 최고위 충성 계약"
    효과:
      - "자연사 불가"
      - "직무 종료 전 퇴직 불가"
      - "결계 봉인축 역할 수행"
    문제:
      - "해고가 곧 생명 위협으로 이어질 수 있다"
      - "당사자의 자유의지가 장기간 소진된다"
  유령직위:
    정의: "실제 담당자가 없거나 사망했지만 계약상 살아 있는 직위"
    발생원인:
      - "파면 미완료"
      - "고의 은폐"
      - "결계와 예산의 비정상 연결"
    후유증:
      - "예산 누수"
      - "권한 중첩"
      - "암살 은폐"
      - "유령 명령 체계 발생"

로맨스연동:
  - "카시안의 자유를 보장하려면 아델린이 제도 자체를 다시 설계해야 한다"
  - "아델린이 공정성을 지키려 할수록 카시안 개인의 생사와 충돌한다"
  - "둘의 감정이 커질수록 해고 절차는 더 위험해진다"
