설명:
  정의: "실제 담당자는 없지만 계약상으로는 살아 있는 직위 사례집"
  용도:
    - "사건형 에피소드 생성"
    - "조직 비리 추적"
    - "결계 및 예산 누수 포인트 관리"

사례목록:
  - 코드: "GP-001"
    직위명: "새벽 종각 감사관"
    현재상태: "100년 전 사망, 급여 지급 중"
    얽힌문제: "종각 결계 유지 예산이 계속 빠져나간다"
    비밀: "대시종장 측이 감찰 보고를 무효화하는 데 해당 직위 명의를 사용했다"
    에피소드활용: "급여 추적, 회계국 잠입, 도로시 첫 활약"
  - 코드: "GP-002"
    직위명: "황궁 북문 임시 봉인기사"
