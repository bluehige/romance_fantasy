세계관기본정보:
  세계이름: "에르디아 제국"
  체제: "황제 중심 관료 귀족제"
  기술수준: "중세 후기 + 마법 행정 시스템"
  장르감각:
    - "궁정 오피스 로코"
    - "정치 미스터리"
    - "직위 기반 계약 마법"
  핵심특징:
    - "마법은 개인 재능보다 계약과 직위 기반으로 작동한다"
    - "황실 관료 조직이 실질적인 권력 중심이다"
    - "모든 공적 권한은 직명 계약을 통해 부여된다"
    - "해고와 발령이 전투 못지않은 고위 마법 행위다"

세계핵심개념:
  직명계약술:
    정의: "공적 직위에 부여된 마법 계약을 통해 권한이 발동되는 시스템"
    핵심규칙:
      - "직위 자체가 마법 권한을 가진다"
      - "개인이 아니라 직위가 권력을 가진다"
      - "직위 변경 시 권한도 이동한다"
      - "해고는 계약 해제이므로 절차 오류가 치명적이다"
  직명록:
    정의: "제국의 모든 공직과 계약이 기록된 마법 장부"
    관리기관: "황실 인사원"
    기능:
      - "직위 생성"
      - "임명 및 파면"
      - "권한 승인"
      - "결계 제어"
      - "예산, 명령, 열람 승인"
  황궁결계:
    정의: "황궁과 수도를 보호하는 초대형 마법 방어 시스템"
    특징:
      - "여러 계약 축으로 구성된다"
      - "일부 계약 축은 인간에게 연결되어 있다"
      - "카시안의 불멸계약은 핵심 축 중 하나다"

사회구조:
  권력구조:
    1위: "황제"
    2위: "직명록 관리국"
    3위: "황실 인사원"
    4위: "대시종장"
    5위: "기사단 및 마법기관"
  특징:
    - "혈통보다 직위가 더 중요하다"
    - "발령이 가장 큰 정치 이벤트다"
    - "파면은 사회적 사망과 동일하다"
    - "무보직은 유령 취급을 받는다"
  문화:
    - "사람보다 직함으로 부르는 경우가 많다"
    - "사내 연애보다 인사 특혜 의혹이 먼저 불붙는다"
    - "장기 계약자는 존경과 공포를 동시에 산다"

주요기관:
  황실인사원:
    역할: "모든 황실 직위와 발령, 계약 적법성을 관리한다"
    위상: "서류 부서처럼 보이지만 제국 최고 권력기관 중 하나다"
    내부부서:
      - "발령국"
      - "파면심사실"
      - "직명록 해석실"
      - "감찰조정팀"
      - "유령직위 정리반"
  기사단:
    역할: "군사 및 치안 유지"
  기록원:
    역할: "왕조 계약 기록과 원문 보존"
  결계국:
    역할: "황궁결계와 직위 연동 방어 체계 관리"
  회계국:
    역할: "급여, 연금, 유령 예산 누수 추적"

정치상황:
  현재상황:
    - "최근 쿠데타가 진압되었고 황실 조직 개편이 진행 중이다"
    - "구왕조 귀족 세력과 휴면 계약 보유자들이 잔존한다"
    - "새 황제는 개혁 의지가 있으나 실무 기반이 약하다"
  주요갈등:
    - "개혁파 vs 구계약 유지파"
    - "관료 권력 vs 귀족 권력"
    - "현 체제 vs 왕조 창건기의 유산"
  숨겨진진실:
    - "왕조 핵심 결계 일부가 특정 인간 계약에 연결되어 있다"
    - "황궁 내부에는 유령 직위와 휴면 충성 계약이 살아 있다"
    - "대시종장은 오래된 계약 해석 공백을 무기로 권력을 유지한다"

로맨스방해장치:
  - "여주가 남주를 보호하면 편애와 인사농단으로 해석된다"
  - "남주를 해방하면 제국 방어 체계가 흔들릴 수 있다"
  - "남주의 자유는 해고와 죽음의 가능성을 함께 불러온다"
