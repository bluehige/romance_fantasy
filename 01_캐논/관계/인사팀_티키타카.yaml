기본원칙:
  - "업무 용어가 곧 개그가 된다"
  - "개그가 설정 설명을 겸한다"
  - "말장난보다 권한과 절차 충돌에서 웃음을 만든다"

반복패턴:
  - 상황: "해고, 발령, 인장, 급여 같은 단어를 연애나 생사 문제와 겹쳐 쓴다"
    예시감각: "퇴사가 자유인지 사망인지 모호한 농담"
  - 상황: "문서상 정확성과 현실의 괴리가 충돌한다"
    예시감각: "죽은 직원 급여가 더 정확하게 지급되는 블랙코미디"
  - 상황: "카시안의 고대식 표현과 현대 행정 용어가 엇갈린다"
    예시감각: "맹세와 전결권이 같은 무게로 취급되는 대화"

주의:
  - "코미디 때문에 비극성이 사라지면 안 된다"
  - "직장인 밈만으로 세계관을 가볍게 만들지 않는다"
  - "대사는 짧고 강하게, 설명은 묻혀 들어가게 한다"