관계정의:
  기본관계: "개혁 실무 책임자와 상징 권력"
  핵심갈등:
    - "황제는 옳은 결정을 원하지만 정치적 비용을 두려워한다"
    - "아델린은 필요하면 황제에게도 불편한 보고를 올린다"

작동원리:
  - "황제는 아델린에게 권한을 주지만 완전한 보호막이 되지 못한다"
  - "아델린은 황제를 개인보다 제도로 먼저 대한다"
  - "두 사람의 신뢰가 흔들리면 개혁 전체가 흔들린다"

장면활용:
  - "아델린이 감당하기 어려운 결정을 황제에게 승인받는 장면"
  - "황제가 정치적 타협을 요구하고 아델린이 반발하는 장면"
  - "후반부 황제가 아델린의 개혁안을 끝내 지지하는 장면"