장르약속:
  톤: "가벼운 로코 외피 + 중후반 정치 스릴러 + 감정선은 진지"
  분위기비율:
    코미디: 35
    로맨스: 35
    정치미스터리: 20
    감정구원: 10
  금지사항:
    - "세계관 설명 과잉"
    - "초반부터 무거운 정치 설명 남발"
    - "남주를 단순한 완벽남으로 소모"
    - "여주를 능력 없는 반응형 캐릭터로 만들기"
  결말방향: "둘 다 살아남고, 사랑과 선택이 제도보다 우위에 서는 결말"

핵심컨셉:
  한줄로그라인: "황실 최대 권력기관인 인사팀의 신임 팀장이 600년째 퇴사하지 못한 불멸기사를 정리하려다, 왕조의 숨겨진 계약 구조와 오래된 쿠데타 음모를 파헤치게 된다."
  상업적훅:
    - "인사팀장이 남주를 해고하려고 한다"
    - "남주는 죽지도 퇴사하지도 못한다"
    - "황실 권력의 핵심이 마법사가 아니라 인사권이다"
  차별화포인트:
    - "북부대공이나 황태자보다 조직과 인사 시스템이 권력의 중심이다"
    - "로맨스 갈등이 감정문제이면서 동시에 계약법과 직위마법 문제다"
    - "직장물 문법과 궁정 로판 문법을 결합한다"
    - "티키타카가 직무 충돌과 성격 충돌에서 동시에 발생한다"

세계핵심명제:
  주제:
    - "사람은 직위보다 먼저 존재하는가"
    - "충성은 명예인가 속박인가"
    - "규칙은 사람을 지키기 위해 존재하는가, 가두기 위해 존재하는가"
  로맨스명제: "서로를 소유하지 않고도 끝까지 선택할 수 있는가"
  서사명제: "가장 오래된 계약은 가장 정당한 계약이 아니라, 가장 오래된 폭력일 수 있다"

세계관3축:
  마법규칙:
    핵심개념: "이 세계의 권력은 마나량보다 직위에 부여된 계약 권한에서 나온다."
    시스템명: "직명 계약술"
    설명: "모든 공적 권한은 직명록에 새겨진 직위와 그 직위에 연결된 계약문으로 작동한다."
    가능:
      - "공적 직위에 맞는 권한 행사"
      - "정식 임명과 파면과 이동을 통한 권한 이전"
      - "직위 기반 결계, 명령, 승인, 열람, 처분"
    불가능:
      - "직명록에 없는 권한의 임의 행사"
      - "적법 절차 없이 고위 계약 해제"
      - "왕조 시기 원계약을 일반 행정명령만으로 파기"
    대가:
      - "고위 계약을 다룰수록 수명, 정신력, 기억이 소모된다"
      - "권한 남용 시 계약 반동이 발생한다"
      - "잘못 해제하면 개인이 아닌 조직 전체에 결계 붕괴가 전염된다"
    제약:
      - "직위와 인장은 원문 계약과 일치해야 한다"
      - "서열이 높다고 무조건 해제가 가능한 것은 아니다"
      - "일부 고대 계약은 해석자, 증인, 적법한 계승자가 모두 필요하다"
    로맨스연결:
      - "남주는 계약 때문에 자유롭게 떠날 수 없다"
      - "여주는 그 계약을 다룰 유일한 실무 책임자다"
      - "사랑이 곧 해고, 해방, 죽음의 선택으로 이어진다"

  사회구조:
    핵심개념: "귀족보다도 직위 보유자가 실권을 가진 관료 귀족제"
    특징:
      - "가문은 배경일 뿐, 실제 권력은 황실 직위 임명권에서 나온다"
      - "승진과 배치는 혼인시장 가치까지 바꾼다"
      - "직위 박탈은 사회적 사형과 비슷한 효과를 낸다"
    계층:
      최상층: "황제, 대시종장, 직명록 관리국, 황실 인사원"
      중간층: "기사단, 회계국, 기록원, 결계국, 조달청"
      하층: "궁정 실무관, 비서, 계약 서기관, 말단 기사"
    문화:
      - "사람을 이름보다 직함으로 부르는 관습"
      - "혼인보다 발령이 더 큰 정치 이벤트"
      - "퇴사는 배신, 좌천은 치욕, 무보직은 유령 취급"
    로맨스연결:
      - "여주와 남주의 관계가 사내 권한남용과 인사농단으로 의심받는다"
      - "여주가 남주를 보호하면 편애, 자르면 숙청으로 해석된다"

  정치구조:
    체제: "황제 중심 관료제 + 왕조 초기 계약에 종속된 준마법 헌정체제"
    현재상황: "직전 쿠데타 진압 이후 황실 조직이 전면 개편 중이다"
    권력핵심:
      - "황제의 상징 권한"
      - "직명록 원문 해석권"
      - "황실 인사 발령권"
      - "궁정 결계 제어권"
    주요갈등:
      - "개혁파 vs 구계약 유지파"
      - "실무관료 vs 혈통귀족"
      - "현 황제 체제 vs 왕조 창건기의 잔재"
    숨은진실:
      - "왕조를 지탱하는 핵심 결계 일부가 남주의 충성 계약에 직접 연결되어 있다"
      - "유령 직위와 휴면 계약들이 아직 황궁 곳곳에 살아 있다"
    로맨스연결:
      - "남주를 풀어주면 나라가 흔들린다"
      - "남주를 붙잡으면 사랑이 아니라 속박이 된다"

주인공축:
  여주:
    이름: "아델린 케스트"
    역할: "황실 인사팀장"
    외적목표: "쿠데타 이후 황실 인사 구조를 정상화하고 유령 직위와 부패한 발령 체계를 정리한다."
    내적결핍: "사람보다 규칙을 더 믿는다. 감정이 판단을 흐린다고 확신한다."
    강점:
      - "비정상 계약 구조를 읽는 뛰어난 행정 감각"
      - "감정적 압박에 강함"
      - "실무와 권력의 연결 지점을 정확히 파악한다"
    약점:
      - "타인을 보호하기 위해서도 냉혹한 결정을 내리는 습관"
      - "사람을 제도 안에서만 이해하려는 경향"
    핵심상처: "가족이 부당한 파면과 좌천으로 몰락했고, 그때 누구도 사람 자체를 보지 않았다."
    변화방향: "규칙의 관리자에서 사람을 살리는 설계자로"

  남주:
    이름: "카시안 렘브란트"
    역할: "직원번호 0001 / 왕조 창건기의 불멸 기사"
    외적목표: "자신을 묶고 있는 계약에서 벗어나거나, 더 이상 의미 없는 충성의 잔재로 살지 않는다."
    내적결핍: "너무 오래 살아 남은 탓에 스스로 원하는 것이 무엇인지 잃어버렸다."
    강점:
      - "전투력과 생존력"
      - "왕조 초기 기록과 비밀에 대한 산지식"
      - "궁정의 허례를 비웃는 냉소"
    약점:
      - "자기 존재를 소모품으로 여김"
      - "자유를 원하면서도 선택을 두려워함"
    핵심상처: "충성은 영광이라는 명목으로 한 인간의 삶이 600년째 유예되었다."
    변화방향: "왕좌의 검에서 자신의 이름을 가진 인간으로"

로맨스핵:
  첫인상:
    여주가본남주: "근무태만, 권위불복종, 처리 불가의 골칫덩이"
    남주가본여주: "인간 대신 문서를 사랑하는 냉혈한 팀장"
  불가능조건:
    - "여주는 남주를 정리해야 한다"
    - "남주는 여주가 풀어줘야만 자유로워질 수 있다"
    - "계약을 잘못 끊으면 남주가 죽거나 궁정 결계가 붕괴한다"
  내적장벽:
    여주: "감정이 개입되면 공정함을 잃는다는 공포"
    남주: "누군가에게 선택받는 일 자체가 다시 속박이 될 거라는 불신"
  끌림포인트:
    - "여주는 남주를 처음으로 유물이 아니라 직원으로 대한다"
    - "남주는 여주를 처음으로 권력자가 아니라 혼자 버티는 사람으로 본다"
  미드포인트사건: "여주가 남주의 원계약을 발견하고, 그가 왕조 핵심 결계의 봉인점이라는 사실을 알게 된다."
  최악의순간: "여주가 나라를 지키기 위해 남주를 다시 직위에 묶는 선택을 한 것처럼 보이는 사건"
  재선택의증거:
    - "여주가 황궁 안정 대신 남주의 자발적 선택권을 우선하는 개혁안을 강행한다"
    - "남주가 떠날 수 있게 된 순간에도 스스로 돌아와 여주와 함께 싸운다"
    - "둘 다 필요해서 곁에 둔 사람이 아니라 선택해서 남은 사람이 된다"

외부플롯핵:
  목표: "황실 조직을 정상화하고, 유령 직위와 고대 계약을 이용한 재쿠데타를 막는다."
  적:
    구조적적: "직위가 사람보다 우선하는 사회"
    인물빌런: "대시종장 라우렌스 헤일"
    보조빌런:
      - "고대 계약을 숭배하는 구왕조 귀족"
      - "승진과 발령으로 사익을 취하는 중간 간부층"
  스테이크:
    개인: "여주가 인사팀장에서 실각하거나 숙청당할 수 있다"
    관계: "남주가 해방 대신 다시 영원한 속박에 묶일 수 있다"
    세계: "황궁 결계와 왕조 핵심 행정 체계가 붕괴할 수 있다"

핵심설정:
  직명록:
    정의: "왕조의 모든 공적 직위와 권한, 계약 원문이 기록된 마법 장부"
    기능:
      - "임명"
      - "파면"
      - "직무 권한 부여"
      - "결계, 예산, 명령 승인"
    특성:
      - "훼손 불가"
      - "원문은 일부만 열람 가능"
      - "잘못 해석하면 계약 반동"
  황실인사원:
    정의: "황실 모든 직위와 발령, 계약의 적법성을 관리하는 기관"
    성격: "세계 최강 권력기관이지만 외부에는 서류 부서처럼 보인다"
    내부부서:
      - "발령국"
      - "파면심사실"
      - "직명록 해석실"
      - "감찰조정팀"
      - "유령직위 정리반"
  불멸기사:
    정의: "왕조 초기에 만들어진 최고위 충성 계약 보유자"
    특징:
      - "자연사하지 않음"
      - "직무 종료 조건이 충족되지 않으면 퇴직 불가"
      - "계약과 결계의 봉인축 역할"
    문제: "사람이 아니라 시스템 부품처럼 취급된다"
  유령직위:
    정의: "실제 담당자는 없지만 계약상으로는 아직 살아 있는 직위"
    영향:
      - "예산 누수"
      - "권한 중첩"
      - "불법 명령 실행"
      - "정치적 암살 은폐"
  직위상속:
    규칙: "혈통보다 적법한 임명 절차가 우선"
    예외: "고대 가문은 창건기 특권 조항을 주장할 수 있다"
  황궁결계:
    정의: "왕조의 핵심 방어 시스템"
    비밀: "복수의 사람 기반 계약축 위에 세워졌고, 카시안은 그 중 가장 오래된 축이다"

캐미스트리설계:
  기본관계: "팀장 vs 정리대상"
  표면텐션:
    - "여주는 규정대로 처리하려 하고 남주는 일부러 비협조적이다"
    - "남주는 여주의 완벽주의를 비웃고 여주는 남주의 냉소를 싫어한다"
  심층텐션:
    - "둘 다 자신을 역할로만 소모해 온 사람"
    - "둘 다 필요에 의해 선택된 적은 많지만 사랑으로 선택된 적은 적다"
  대사온도:
    초반: "건조한 공방, 비꼼, 명령-반문 구조"
    중반: "서로의 논리를 인정하는 티키타카"
    후반: "짧고 낮은 직진 대사, 행동이 먼저 나간다"
  금지:
    - "초반부터 과한 플러팅"
    - "남주의 일방적 집착만으로 관계 진전"
    - "여주의 무조건적 구원자화"

시즌1핵심:
  시즌명: "개혁과 해고 불가"
  시즌목표:
