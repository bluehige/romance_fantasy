시즌정보:
  시즌명: "제0서고와 깨어나는 충성"
  시즌번호: 2
  목표회차: 20
  핵심질문: "왕조 첫 명령을 해독하는 동안 아델린과 카시안은 공적 계약보다 서로를 먼저 선택할 수 있는가"

장르보완목표:
  - "로맨스가 후반부 선언이 아니라 초반부터 체감되게 한다"
  - "조사 반복을 줄이고 챕터마다 다른 장르 체감을 준다"
  - "사건 훅과 감정 훅을 매 화 동시에 남긴다"

시즌목표:
  외부플롯:
    - "제0서고 진입과 왕조 첫 명령 해독"
    - "휴면 충성 계약의 외곽 기동 확산 차단"
    - "라우렌스의 원계약 보존 설계 라인 추적"
  로맨스플롯:
    - "비밀 공조에서 감정적 우선순위로 이동"
    - "질투, 불안, 보호 본능을 가시화"
    - "공적 판단과 사적 감정의 충돌을 공개화"
  미스터리축:
    - "왕조 첫 명령의 원래 대상 확인"
    - "대체 계약의 첫 조건 확보"
    - "헤일 가문이 왜 카시안 계약을 보존하려 했는지 추적"
  반복방지전략:
    - "문서 조사만 반복하지 않고 잠입, 연회, 구조, 청문, 추격을 배치"
    - "각 챕터의 독자 질문을 다르게 설계"
    - "말미 훅을 사건 단서만이 아니라 관계 변화와 묶기"

독자체감목표:
  - "이번 시즌은 둘이 서로를 특별하게 대하는 장면이 눈에 띄게 많아야 한다"
  - "직위 미스터리보다 관계의 변화가 먼저 기억나야 한다"
  - "각 챕터가 서로 다른 작품 파트처럼 느껴질 정도로 체감 장르를 분리한다"

핵심구간:
  시작:
    - "제0서고 진입 조건을 얻기 위해 아델린과 카시안이 비밀 공조를 시작한다"
    - "황실 내부에서는 둘의 밀착을 두고 불편한 소문이 돌기 시작한다"
  1차전환:
    - "제0서고 외곽 진입 성공"
    - "왕조 첫 명령 일부가 카시안 개인보다 황실 전체의 충성 체계와 연결됨이 드러난다"
  미드포인트:
    - "연회와 정치전에서 둘의 관계가 공적 의심 대상으로 떠오른다"
    - "카시안을 노린 외부 혼담/이용 시도가 등장해 아델린의 감정이 흔들린다"
  후반전환:
    - "휴면 충성 계약이 도시 단위로 흔들리며 실제 인명 위기가 발생한다"
    - "아델린이 카시안을 공적으로도 지켜야 하는 위치에 선다"
  시즌엔딩:
    - "라우렌스가 원계약 보존 구조의 핵심 설계자라는 증거 확보"
    - "대체 계약의 첫 조건이 `상호 선택`과 연결되어 있음이 드러난다"
    - "둘은 더 이상 비밀리에만 서로의 편일 수 없는 상태가 된다"

로맨스단계:
  - "비밀 공조"
  - "독점적 시선과 질투"
  - "공개적 보호"
  - "공적 판단과 사적 감정의 충돌"
  - "서로를 우선하는 선택의 전조"

금지반복:
  - "세 화 연속 문서 조사 중심 전개 금지"
  - "말미 훅이 연속으로 `새 문서 발견`만으로 끝나는 구성 금지"
  - "로맨스 진전이 없는 회차 연속 두 화 초과 금지"
