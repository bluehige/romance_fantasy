챕터구성:
  - 챕터: 1
    제목: "돌 없는 문"
    회차: "ep021~ep024"
    역할: "시즌2 문제의식과 비밀 공조 성립"
    외부플롯:
      - "제0서고 접근권 확보"
      - "돌 없는 문 외곽 진입"
      - "왕조 첫 명령의 첫 단서 확보"
    로맨스플롯:
      - "둘만 공유하는 비밀 작업 루틴 형성"
      - "서로의 취약점을 처음 능동적으로 덮어 준다"
    변주장치: "야간 잠입, 봉인 해제, 소수 공조"
    독자보상: "사건보다 먼저 비밀스러운 밀착감이 보인다"
    챕터말미전환: "제0서고 진입이 성공하지만 둘의 관계가 소문으로 번지기 시작한다"
  - 챕터: 2
    제목: "가면과 소문"
    회차: "ep025~ep028"
    역할: "정치전과 질투의 가시화"
    외부플롯:
      - "황실 연회에서 제0서고 키를 쥔 귀족 라인 접근"
      - "라우렌스가 둘을 떼어 놓기 위한 공적 압박 시작"
    로맨스플롯:
      - "혼담, 동행 배치, 공개 시선 속에서 질투와 불안을 드러낸다"
      - "둘의 말투와 반응이 타인 눈에도 특별하게 보이기 시작한다"
    변주장치: "연회, 소문전, 정치 협상"
    독자보상: "로맨스 체감이 명확하게 올라간다"
    챕터말미전환: "휴면 충성 계약이 연회장을 벗어나 도시 외곽에서 실제로 깨어난다"
  - 챕터: 3
    제목: "깨어나는 충성"
    회차: "ep029~ep032"
    역할: "도시형 위기와 보호 본능 강화"
    외부플롯:
      - "휴면 충성 계약 기동 대응"
      - "카시안 옛 부하 라인과 연결된 생존자 등장"
      - "라우렌스의 실험 범위가 인명 단위였음이 드러남"
    로맨스플롯:
      - "서로를 지키는 선택이 업무 기준을 넘어선다"
      - "상실 공포가 직접 언어로 드러난다"
    변주장치: "도시 붕괴 대응, 구조, 추격"
    독자보상: "조사가 아니라 살아남아야 하는 긴장"
    챕터말미전환: "카시안을 증인으로 둘지, 다시 봉인축으로 돌릴지 공개 논쟁이 열린다"
  - 챕터: 4
    제목: "증언과 심문"
    회차: "ep033~ep036"
    역할: "공개 청문과 공적 선택"
    외부플롯:
      - "카시안 관련 청문과 책임 공방"
      - "아델린의 권한, 명성, 정치 기반이 시험대에 오른다"
      - "왕조 첫 명령의 해석권을 놓고 정면 대립"
    로맨스플롯:
      - "아델린이 카시안을 공적으로도 지키는 선택을 한다"
      - "카시안도 더 이상 거리 두기로 버티지 못한다"
    변주장치: "청문, 심문, 증언전"
    독자보상: "둘이 서로의 편이라는 사실이 공식 공간에서 드러난다"
    챕터말미전환: "제0서고 최심부 진입 조건이 충족되고, 둘이 함께 내려가야만 문이 열린다는 사실이 나온다"
  - 챕터: 5
    제목: "첫 명령의 나머지"
    회차: "ep037~ep040"
    역할: "시즌2 진실 공개와 다음 단계 선택"
    외부플롯:
      - "제0서고 최심부 진입"
      - "왕조 첫 명령의 잔여 문장 확보"
      - "대체 계약의 첫 조건 발견"
    로맨스플롯:
      - "둘이 서로를 우선하는 선택을 명시적으로 한다"
      - "완전한 고백 직전의 단계까지 감정선을 끌어올린다"
    변주장치: "심층 서고 탐사, 봉인 해제, 최종 선택"
    독자보상: "미스터리 회수와 로맨스 진전이 동시에 온다"
    챕터말미전환: "시즌3에서 왕조 전체를 흔들 실전 개편 단계로 넘어간다"
