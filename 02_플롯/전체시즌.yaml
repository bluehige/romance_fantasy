전체시즌:
  - 시즌: 1
    제목: "개혁과 해고 불가"
    질문: "카시안을 자르지 않고도 개혁을 시작할 수 있는가"
    로맨스단계: "업무 충돌 -> 신뢰 -> 서로의 편"
    핵심변주: "인사 미스터리, 현장 조사, 해석 협업, 행정 압박"
    결과: "카시안이 봉인축임이 드러나고 둘이 서로의 편임을 인정한다"
  - 시즌: 2
    제목: "제0서고와 깨어나는 충성"
    질문: "왕조 첫 명령을 해독하는 동안 둘은 공적 계약보다 서로를 먼저 선택할 수 있는가"
    로맨스단계: "비밀 공조 -> 질투와 보호 -> 공개적 우선순위 충돌"
    핵심변주: "잠입, 연회 정치전, 도시형 붕괴 대응, 공개 청문"
    결과: "라우렌스가 원계약 보존 구조의 설계자라는 증거와 대체 계약의 첫 조건을 확보한다"
  - 시즌: 3
    제목: "왕조의 첫 명령"
    질문: "가장 오래된 명령은 누구를 위한 것이었는가"
    로맨스단계: "서로를 지키는 선택이 제도 충돌로 번진다"
    핵심변주: "왕실 내전급 정치전, 과거 회수, 계약 해체 실험"
    결과: "왕좌의 영원한 검을 대체할 실마리를 확보하고 황실 질서가 흔들린다"
  - 시즌: 4
    제목: "퇴사와 재계약"
    질문: "사랑과 선택이 제도보다 우위에 설 수 있는가"
    로맨스단계: "상호 선택의 완성"
    핵심변주: "왕좌 계약 붕괴전, 선택형 계약, 최종 정치 결산"
    결과: "카시안이 처음으로 자발적 계약을 선택하고 제도가 사랑을 따라 다시 쓰인다"
