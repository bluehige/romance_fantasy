보강원칙:
  - "로맨스는 설명이 아니라 둘만의 반응 차이로 보강한다"
  - "사건 훅만 남기지 말고 감정 여파를 함께 남긴다"
  - "업무 호흡 장면을 관계 진전 장면으로 한 단계 끌어올린다"

우선보강회차:
  - 회차: ep003
    부족지점: "강제 협업 시작은 좋지만 감정 긴장이 아직 기능적이다"
    보강장면:
      - "임시 발령 직후 둘만 남은 사무실에서 서로의 첫 사적 경계선이 드러나는 대화 추가"
      - "아델린이 카시안의 피로를 처음 눈치채는 짧은 관찰 장면 추가"
    기대효과: "업무 파트너가 아니라 서로를 의식하기 시작한 두 사람으로 체감 전환"
  - 회차: ep005
    부족지점: "티키타카는 있으나 로맨스 신호로 읽히는 장면이 약하다"
    보강장면:
      - "종각 현장에서 둘만의 호흡이 맞는 순간과 도로시가 그 분위기를 눈치채는 반응 추가"
      - "카시안이 아델린의 체온, 피로, 위험을 먼저 감지하는 짧은 행동 추가"
    기대효과: "가벼운 업무 농담이 아니라 독점적 시선으로 읽히게 전환"
  - 회차: ep008
    부족지점: "첫 보호 장면의 여운이 바로 사건으로 넘어간다"
    보강장면:
      - "카시안이 아델린을 보호한 직후 둘 사이의 침묵과 시선 정리 장면 추가"
      - "아델린이 자신이 왜 그 순간 흔들렸는지 스스로 부정하는 짧은 내면 추가"
    기대효과: "첫 보호가 시즌 로맨스 분기점으로 보이게 강화"
  - 회차: ep010
    부족지점: "`유물`에서 `사람`으로 보는 전환이 개념적으로만 전달된다"
    보강장면:
      - "아델린이 카시안의 증언을 끝까지 기다리는 선택을 더 명확히 드러내기"
      - "카시안이 그 대우를 낯설어하는 반응 보강"
    기대효과: "신뢰가 감정의 씨앗으로 읽히게 보정"
  - 회차: ep012
    부족지점: "죄책감 노출은 있지만 둘의 정서적 밀착이 짧다"
    보강장면:
      - "카시안이 옛 부하 명단 앞에서 무너지는 순간 아델린이 곁에 남는 장면 추가"
      - "위로보다 동행을 택하는 아델린의 태도 강조"
    기대효과: "감정 공조 단계 진입"
  - 회차: ep015
    부족지점: "동맹 전환이 사건 논리로만 읽힐 수 있다"
    보강장면:
      - "휴면 계약실 이후 아델린이 카시안을 부품으로 두지 않겠다고 명시하는 장면 추가"
      - "카시안이 그 말을 가볍게 넘기지 못하는 반응 추가"
    기대효과: "정치적 동맹이 아니라 감정적 약속으로 읽힘"
  - 회차: ep017
    부족지점: "카시안의 이탈 시도가 논리적으로는 맞지만 감정 충돌이 더 필요하다"
    보강장면:
      - "카시안이 물러나려 할 때 아델린이 처음으로 개인 감정을 섞어 붙잡는 장면 추가"
      - "둘의 갈등이 권한 문제가 아니라 상실 공포 문제임을 드러내기"
    기대효과: "로맨스 긴장 본격화"
  - 회차: ep020
    부족지점: "서로의 편임을 인정하지만 감정 보상은 아직 절제돼 있다"
    보강장면:
      - "공적 계약 등록 후 둘만 남는 짧은 후일담 장면 추가"
      - "다음 시즌으로 이어질 사적 약속 또는 미완의 고백성 문장 추가"
    기대효과: "시즌 엔딩의 로맨스 체감 강화"
