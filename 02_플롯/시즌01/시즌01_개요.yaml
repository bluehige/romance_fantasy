시즌정보:
  시즌명: "개혁과 해고 불가"
  시즌번호: 1
  목표회차: 20
  핵심질문: "카시안을 자르지 않고도 황실 개혁을 시작할 수 있는가"

시즌목표:
  외부플롯:
    - "유령직위 사건 1차 정리"
    - "카시안을 둘러싼 해고 불가 구조 파악"
    - "라우렌스 헤일의 그림자 노출"
  감정플롯:
    - "아델린과 카시안의 강제 협업 성립"
    - "상호 불신에서 상호 인정으로 이동"
    - "감정이 직무를 흔드는 첫 조짐 형성"

핵심구간:
  시작:
    - "아델린이 인사팀장으로 부임한다"
    - "카시안 해고 시도 실패로 황궁결계가 흔들린다"
  미드포인트:
    - "유령직위 사건을 수사하며 카시안의 예외성이 시스템 문제임을 안다"
    - "보안 준법감시관 임시 발령으로 공식 협업이 시작된다"
  후반전환:
    - "왕조 첫 명령과 연결된 카시안의 원계약 흔적 발견"
    - "라우렌스가 유령직위를 이용해 반격한다"
  시즌엔딩:
    - "카시안이 황궁결계 봉인축 중 하나라는 사실이 드러난다"
    - "아델린이 그를 자르지 못하는 이유가 공적, 사적 양쪽에서 완성된다"

기대효과:
  - "오피스 로코 훅 고정"
  - "정치 미스터리 톤 안착"
  - "메인 커플의 관계 축 고정"